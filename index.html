<html lang="fr" id="htmlRoot">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#09090f;--surf:#111118;--surf2:#16161f;--surf3:#1c1c28;
  --brd:#1e1e2e;--brd2:#2a2a3e;
  --acc:#8b5cf6;--acc2:#06b6d4;--acc3:#c4b5fd;--acc-glow:rgba(139,92,246,.35);
  --grn:#10b981;--red:#f43f5e;--org:#f97316;--ylw:#fbbf24;
  --txt:#f1f5f9;--txt2:#94a3b8;--mut:#475569;
  --r:22px;--r2:16px;--r3:28px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,Roboto,'Helvetica Neue',Arial,sans-serif;
  --mono:'JetBrains Mono','SF Mono','Roboto Mono',ui-monospace,Menlo,Monaco,Consolas,monospace;
}
html,body{height:100%;height:100dvh}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:14px;overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;font-feature-settings:"cv02","cv03","cv04","cv11";letter-spacing:-0.005em}

/* SCROLL */
.scroll{position:fixed;top:0;left:0;right:0;bottom:84px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.page{max-width:600px;margin:0 auto;padding:14px 14px 24px}

/* NAV */
.nav{position:fixed;bottom:max(8px,env(safe-area-inset-bottom));left:8px;right:8px;height:64px;background:rgba(20,20,32,0.85);border:1px solid var(--brd2);border-radius:28px;display:flex;align-items:center;justify-content:space-around;padding:0 4px;z-index:100;backdrop-filter:blur(28px) saturate(1.4);-webkit-backdrop-filter:blur(28px) saturate(1.4);box-shadow:0 12px 40px -12px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04) inset}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--mut);font-size:9px;font-weight:700;letter-spacing:.5px;cursor:pointer;padding:6px 10px;border-radius:10px;transition:all .18s;text-transform:uppercase;min-width:44px}
.ni.on{color:var(--acc3);background:rgba(124,58,237,.12)}
.ni svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
.fab{background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:20px;width:56px;height:56px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;box-shadow:0 8px 24px -4px var(--acc-glow),0 0 0 4px rgba(139,92,246,.12);transition:transform .12s,border-radius .2s;margin-top:-22px;flex-shrink:0}
.fab:active{transform:scale(.92);border-radius:28px}
.fab svg{stroke:#fff;width:22px;height:22px;stroke-width:2.5}

/* CARD */
.card{background:linear-gradient(180deg,var(--surf),var(--surf2));border:1px solid var(--brd);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:0 1px 0 rgba(255,255,255,.03) inset,0 8px 24px -16px rgba(0,0,0,.6)}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:10px;font-weight:700;color:var(--mut);letter-spacing:.8px;text-transform:uppercase}
.card-hero{background:linear-gradient(150deg,#100f24,#0a0a16);border-color:var(--brd2)}

/* BALANCE */
.bal{font-family:var(--mono);font-size:clamp(24px,7vw,34px);font-weight:700;letter-spacing:-1px;line-height:1}
.badge{background:rgba(124,58,237,.15);border:1px solid var(--acc);border-radius:20px;padding:3px 10px;font-size:10px;color:var(--acc3);font-weight:700}

/* KPI */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.kt{background:var(--surf2);border-radius:var(--r2);padding:12px;border:1px solid var(--brd);cursor:pointer;transition:border-color .2s}
.kt:active{border-color:var(--acc)}
.kl{font-size:10px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.kv{font-size:16px;font-weight:800;margin-top:4px;font-family:var(--mono)}
.ks{font-size:10px;color:var(--mut);margin-top:2px}

/* BAR */
.bar{height:4px;background:var(--surf3);border-radius:10px;overflow:hidden;margin:5px 0}
.bf{height:100%;border-radius:10px;transition:width .5s ease}

/* ALERTS */
.al{padding:9px 12px;border-radius:12px;margin-bottom:7px;font-size:12px;font-weight:600;line-height:1.45;border-left:3px solid}
.al-d{background:rgba(244,63,94,.07);border-color:var(--red)}
.al-w{background:rgba(251,191,36,.07);border-color:var(--ylw)}
.al-g{background:rgba(16,185,129,.07);border-color:var(--grn)}
.al-i{background:rgba(124,58,237,.08);border-color:var(--acc)}

/* TX */
.txi{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--brd)}
.txi:last-child{border-bottom:none}
.txic{width:38px;height:38px;border-radius:11px;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.txin{flex:1;min-width:0}
.txn{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txm{font-size:10px;color:var(--mut);margin-top:2px}
.txa{font-family:var(--mono);font-size:13px;font-weight:700;white-space:nowrap}

/* HEATMAP */
.hg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.hd{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;cursor:pointer;position:relative;transition:transform .1s;color:rgba(255,255,255,.7)}
.hd:active{transform:scale(.85)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mo.on{display:flex;animation:fi .15s ease}
.mb{background:linear-gradient(180deg,var(--surf2),var(--surf));border-radius:32px 32px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:6px 20px 36px;border-top:1px solid var(--brd2);box-shadow:0 -20px 60px -10px rgba(0,0,0,.7)}
.mh{width:36px;height:4px;background:var(--brd2);border-radius:10px;margin:10px auto 14px;cursor:pointer}
.mb h3{font-size:17px;font-weight:800;margin-bottom:14px}

/* INPUTS */
.fi{width:100%;background:var(--surf2);border:1px solid var(--brd);border-radius:var(--r2);padding:13px 14px;color:var(--txt);font-family:var(--font);font-size:14px;font-weight:600;margin-bottom:9px;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.fi:focus{border-color:var(--acc)}
.fi::placeholder{color:var(--mut);font-weight:400}
select.fi{cursor:pointer}

/* BUTTONS */
.btn{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:18px;padding:15px;font-weight:700;font-size:14px;color:#fff;width:100%;cursor:pointer;transition:transform .12s,box-shadow .2s;font-family:var(--font);letter-spacing:.2px;box-shadow:0 4px 14px -4px var(--acc-glow)}
.btn:active{opacity:.85;transform:scale(.98)}
.btn-ghost{background:transparent;border:1px solid var(--brd2);color:var(--txt2);font-family:var(--font);font-weight:600;font-size:13px}
.btn-red{background:linear-gradient(135deg,var(--red),#be185d)}
.btn-grn{background:linear-gradient(135deg,var(--grn),#059669)}
.btn-sm{padding:8px 14px;width:auto;font-size:12px;border-radius:20px}

/* TYPE TABS */
.ttabs{display:flex;gap:7px;margin-bottom:12px}
.tt{flex:1;padding:12px;border-radius:12px;border:1px solid var(--brd);background:var(--surf2);color:var(--mut);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.tt.te{border-color:var(--red);color:var(--red);background:rgba(244,63,94,.08)}
.tt.ti{border-color:var(--grn);color:var(--grn);background:rgba(16,185,129,.08)}
.tt.tt2{border-color:var(--acc2);color:var(--acc2);background:rgba(99,102,241,.08)}

/* CHAT */
.chat{height:240px;overflow-y:auto;padding:10px;background:var(--surf2);border-radius:14px;margin-bottom:10px;display:flex;flex-direction:column;gap:7px;scroll-behavior:smooth}
.bub{max-width:88%;padding:9px 13px;border-radius:14px;font-size:12px;line-height:1.5;font-weight:500}
.bai{background:var(--surf3);border:1px solid var(--brd2);border-bottom-left-radius:3px;align-self:flex-start}
.bus{background:linear-gradient(135deg,var(--acc),var(--acc2));border-bottom-right-radius:3px;align-self:flex-end}
.cirow{display:flex;gap:7px;align-items:center}
.cirow .fi{margin-bottom:0;flex:1;padding:10px 13px}
.sbtn{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.sbtn svg{stroke:#fff;width:16px;height:16px}
.ald{display:flex;gap:4px;padding:9px 13px}
.add{width:6px;height:6px;border-radius:50%;background:var(--acc3);animation:dp 1.2s ease-in-out infinite}
.add:nth-child(2){animation-delay:.2s}
.add:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

/* GOAL */
.gi{margin-bottom:12px}
.gh{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.gn{font-size:13px;font-weight:700}
.gp{font-size:11px;color:var(--mut);font-family:var(--mono)}
.geta{font-size:10px;color:var(--acc3);margin-top:3px}

/* WEEKBAR */
.wb{display:flex;align-items:flex-end;gap:5px;height:72px;margin-top:7px}
.wbc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.wbf{width:100%;border-radius:6px 6px 0 0;min-height:6px;transition:height .5s,background .3s}
.wbl{font-size:9px;color:var(--mut);font-weight:700}

/* ACC CHIP */
.ach{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:13px;background:var(--surf2);border:1px solid var(--brd);margin-bottom:7px;cursor:pointer;transition:border-color .2s}
.ach:active{border-color:var(--acc)}

/* SCORE */
.sring{display:flex;flex-direction:column;align-items:center;gap:5px}

/* SYNC */
.scode{font-family:var(--mono);font-size:12px;letter-spacing:2px;background:var(--surf2);border:1px solid var(--acc);border-radius:12px;padding:14px;text-align:center;color:var(--acc3);word-break:break-all}

/* ANIMS */
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.fin{animation:su .2s ease}

/* MISC */
.flex{display:flex;align-items:center;gap:8px}
.sb{justify-content:space-between}
.tg{color:var(--grn)}.tr{color:var(--red)}.ta{color:var(--acc3)}.tm{color:var(--mut)}
.mono{font-family:var(--mono)}.fw8{font-weight:800}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mb8{margin-bottom:8px}
.div{height:1px;background:var(--brd);margin:10px 0}
.pill{background:var(--surf2);border:1px solid var(--brd);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700}

/* TX filter tabs */
.ftabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.ftab{padding:6px 14px;border-radius:20px;border:1px solid var(--brd);background:var(--surf2);color:var(--mut);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s}
.ftab.on{background:var(--acc);color:#fff;border-color:var(--acc)}

/* SECTION TITLE */
.stitle{font-size:20px;font-weight:800;margin-bottom:14px;letter-spacing:-.3px}
.ssub{font-size:12px;color:var(--mut);margin-bottom:14px;margin-top:-8px}

/* ONLINE BADGE - bulletproof fixed (iOS WebKit safe) */
.online-badge{position:fixed !important;top:calc(8px + env(safe-area-inset-top));right:12px;z-index:9999;padding:5px 11px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.5px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:opacity .2s;pointer-events:none;transform:translateZ(0);-webkit-transform:translate3d(0,0,0);will-change:auto;contain:layout style}
.mo.on ~ .online-badge,body.modal-open .online-badge{opacity:0;transform:translateY(-6px)}
.ob-on{background:rgba(16,185,129,.15);border:1px solid var(--grn);color:var(--grn)}
.ob-off{background:rgba(244,63,94,.15);border:1px solid var(--red);color:var(--red)}


/* AI FLOAT */
.aifab{position:fixed;right:14px;bottom:78px;bottom:calc(78px + env(safe-area-inset-bottom));z-index:90;
  width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  box-shadow:0 6px 20px rgba(124,58,237,.45),0 0 0 3px rgba(124,58,237,.18);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  transition:transform .15s,opacity .25s;animation:pulseAI 2.4s ease-in-out infinite}
.aifab:active{transform:scale(.9)}
.aifab.off{opacity:.45;animation:none}
.aifab .dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--grn);
  box-shadow:0 0 8px var(--grn)}
.aifab.off .dot{background:var(--mut);box-shadow:none}
@keyframes pulseAI{0%,100%{box-shadow:0 6px 20px rgba(124,58,237,.45),0 0 0 3px rgba(124,58,237,.18)}
  50%{box-shadow:0 6px 24px rgba(124,58,237,.65),0 0 0 6px rgba(124,58,237,.10)}}
.mo.on ~ .aifab{opacity:0;pointer-events:none}

/* AI INSIGHT CARD on home */
.ai-insight{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(99,102,241,.05));
  border:1px solid rgba(167,139,250,.35);border-radius:var(--r);padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
.ai-insight::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(167,139,250,.12),transparent 70%);pointer-events:none}
.ai-insight .ai-h{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:800;color:var(--acc3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.ai-insight .ai-b{font-size:13px;line-height:1.55;color:var(--txt);font-weight:500;position:relative}
.ai-insight .ai-loading{display:inline-block;width:8px;height:8px;background:var(--acc3);border-radius:50%;
  animation:dp 1.2s infinite}

/* TREND CHART */
.trend-svg{width:100%;height:130px;display:block}
.trend-svg .area{fill:url(#trendGrad);opacity:.6}
.trend-svg .line{fill:none;stroke:var(--acc3);stroke-width:2.2;stroke-linejoin:round;stroke-linecap:round}
.trend-svg .pt{fill:var(--acc3);stroke:var(--bg);stroke-width:2}
.trend-svg .axis{stroke:var(--brd);stroke-width:1;stroke-dasharray:2 4}
.trend-svg .lbl{fill:var(--mut);font-size:9px;font-family:var(--mono);font-weight:700}

/* CELEBRATION TOAST */
.celebration{position:fixed;left:50%;top:80px;transform:translateX(-50%);z-index:300;
  background:linear-gradient(135deg,rgba(16,185,129,.95),rgba(124,58,237,.92));
  color:#fff;padding:14px 20px;border-radius:16px;
  font-size:13px;font-weight:700;line-height:1.4;max-width:88%;text-align:center;
  box-shadow:0 12px 30px rgba(0,0,0,.4),0 0 0 3px rgba(255,255,255,.08);
  animation:celIn .3s cubic-bezier(.2,.9,.3,1.2),celOut .25s ease 3.2s forwards}
@keyframes celIn{from{opacity:0;transform:translate(-50%,-20px) scale(.9)}to{opacity:1;transform:translate(-50%,0) scale(1)}}
@keyframes celOut{to{opacity:0;transform:translate(-50%,-10px) scale(.95)}}
.celebration small{display:block;font-weight:500;opacity:.9;font-size:11px;margin-top:3px}

/* SEARCH */
.search-box{display:flex;align-items:center;gap:8px;background:var(--surf2);border:1px solid var(--brd);border-radius:12px;padding:10px 14px;margin-bottom:12px}
.search-box input{flex:1;background:none;border:none;color:var(--txt);font-size:14px;outline:none;font-family:var(--font)}
.search-box input::placeholder{color:var(--mut)}
.search-box svg{stroke:var(--mut);width:16px;height:16px;flex-shrink:0;fill:none;stroke-width:2}
</style>
</head>
<body>

  <div id="root" class="page"></div>
</div>

<div class="online-badge" id="onlineBadge"></div>

<div class="mo" id="modal"><div class="mb" id="mbc"></div></div>

  // 1. Préférence utilisateur sauvegardée
  const saved=localStorage.getItem('app_lang');
  if(saved && I18N[saved]) return saved;
  // 2. Langue du navigateur/téléphone
  const nav=(navigator.language||navigator.userLanguage||'fr').slice(0,2).toLowerCase();
  if(I18N[nav]) return nav;
  // 3. Fallback français
  return 'fr';
}

const DB='FinOS_v3';let db=null;
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open(DB,2);
  r.onerror=()=>rej(r.error);
  r.onsuccess=()=>{db=r.result;res(db)};
  r.onupgradeneeded=e=>{
    const d=e.target.result;
    ['transactions','accounts','categories','goals','settings'].forEach(s=>{
      if(!d.objectStoreNames.contains(s)){
        const st=d.createObjectStore(s,{keyPath:s==='settings'?'key':'id'});
        if(s==='transactions'){st.createIndex('date','date');st.createIndex('type','type')}
      }
    });
  };
});}
async function dbAll(s){if(!db)await openDB();return new Promise((res,rej)=>{const t=db.transaction(s,'readonly');const r=t.objectStore(s).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error)})}
async function dbPut(s,d){if(!db)await openDB();return new Promise((res,rej)=>{const t=db.transaction(s,'readwrite');const r=t.objectStore(s).put(d);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
async function dbDel(s,id){if(!db)await openDB();return new Promise(res=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(id);t.oncomplete=()=>res()})}
async function dbClear(s){if(!db)await openDB();return new Promise(res=>{const t=db.transaction(s,'readwrite');t.objectStore(s).clear();t.oncomplete=()=>res()})}

// ════════════════════════════════════════
// KPIs — Modèle Cashflow Dynamique (Rolling)
// Abandonne le calendrier mensuel (1→30).
// Tout est calculé sur des fenêtres glissantes
// de 7j et 30j pour coller aux flux journaliers.
// ════════════════════════════════════════
function txsInWindow(days){
  const cutoff=new Date(Date.now()-days*86400000);
  return txs.filter(t=>new Date(t.date)>=cutoff);
}

function computeKPIs(){
  const now=new Date();
  // ── Fenêtre adaptative — si moins de 14j de données, on calcule sur les jours réels ──
  const firstTxDate=txs.length?new Date(txs[txs.length-1].date):now;
  const dataDays=Math.max(1,Math.min(30,Math.ceil((now-firstTxDate)/86400000)+1));
  const isShortHistory=dataDays<14;
  const win30=isShortHistory?dataDays:30;
  const win7 =Math.min(7,dataDays);
  // ── Fenêtres glissantes ──────────────────
  const w7 =txsInWindow(win7);
  const w30=txsInWindow(win30);

  const inc7 =w7 .filter(t=>t.type==='income' ).reduce((s,t)=>s+t.amount,0);
  const exp7 =w7 .filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const inc30=w30.filter(t=>t.type==='income' ).reduce((s,t)=>s+t.amount,0);
  const exp30=w30.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  // ── Comptes ─────────────────────────────
  const activeBalance=accs.filter(a=>a.type!=='savings').reduce((s,a)=>s+a.balance,0);
  const savingsBalance=accs.filter(a=>a.type==='savings').reduce((s,a)=>s+a.balance,0);
  const balance=activeBalance;

  // ── Burn rate lissé — fenêtre adaptative ─────────────
  // "Si rien n'entre demain, tu tiens X jours."
  const burnRate=exp30/win30;   // moyenne journalière sur la fenêtre disponible
  // ── Revenus attendus (Cushion prévisionnel) ─────────
  const expectedIncome7d=parseFloat(settings.expectedIncome7d)||0;
  const safetyDays=burnRate>0?Math.floor(balance/burnRate):9999;
  const safetyDaysWithSavings=burnRate>0?Math.floor((balance+savingsBalance+expectedIncome7d)/burnRate):9999;

  // ── Taux de Rétention — fenêtre adaptative ──
  const retention=inc30>0?Math.max(0,Math.round(((inc30-exp30)/inc30)*100)):null;

  // ── Indice de Pression — désactivé si historique court ────
  let pressureIdx=0;
  if(!isShortHistory){
    const dailyAvg30=exp30/win30;
    const dailyAvg7 =exp7/win7;
    pressureIdx=dailyAvg30>0?Math.round(((dailyAvg7-dailyAvg30)/dailyAvg30)*100):0;
  }

  // ── Vélocité post-revenu ─────────────────
  // Dans les 48h après une entrée d'argent, combien est déjà parti ?
  let evaporationRate=0;
  const incomeEvents=txs.filter(t=>t.type==='income').slice(0,5);
  if(incomeEvents.length){
    const samples=incomeEvents.map(inc=>{
      const t0=new Date(inc.date).getTime();
      const spent48h=txs.filter(t=>t.type==='expense'&&new Date(t.date).getTime()>=t0&&new Date(t.date).getTime()<=t0+172800000).reduce((s,t)=>s+t.amount,0);
      return inc.amount>0?spent48h/inc.amount:0;
    });
    evaporationRate=Math.round((samples.reduce((s,v)=>s+v,0)/samples.length)*100);
  }

  // ── Dopamine Index ───────────────────────
  // Ratio dépenses impulsion (loisirs/resto/imprévus/vêtements) vs investissement (tech/études)
  // 'food' retiré du défaut — manger n'est pas une impulsion sauf snack/livraison
  const IMPULSE_CATS=['leisure','clothes','unforeseen','other_exp'];
  const FOOD_IMPULSE_KEYWORDS=/snack|fast.?food|livraison|delivery|resto|burger|pizza|glace|bonbon/i;
  const isFoodImpulse=t=>t.categoryId==='food' && t.note && FOOD_IMPULSE_KEYWORDS.test(t.note);
  const INVEST_CATS=['tech','studies','invest_inc','youtube'];
  const impulseSpend=w30.filter(t=>t.type==='expense'&&(IMPULSE_CATS.includes(t.categoryId)||isFoodImpulse(t))).reduce((s,t)=>s+t.amount,0);
  const investSpend=w30.filter(t=>t.type==='expense'&&INVEST_CATS.includes(t.categoryId)).reduce((s,t)=>s+t.amount,0);
  const dopamineIdx=exp30>0?Math.round((impulseSpend/exp30)*100):0;
  const investIdx  =exp30>0?Math.round((investSpend/exp30)*100):0;
  // ── Effet Fourmi — petites tx <200 cumulées 30j ──
  const ANT_THRESHOLD=parseFloat(settings.antThreshold)||200;
  const antTotal=w30.filter(t=>t.type==='expense'&&t.amount<=ANT_THRESHOLD).reduce((s,t)=>s+t.amount,0);
  const antCount=w30.filter(t=>t.type==='expense'&&t.amount<=ANT_THRESHOLD).length;
  // ── Mode fin de mois ──
  const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const isEndOfMonth=(dim-now.getDate())<=4;

  // ── Empreinte chrono (dépenses nocturnes) ─
  // Transactions entre 21h et 5h = fatigue cognitive / compensation
  const nightTxs=w30.filter(t=>{const h=new Date(t.date).getHours();return t.type==='expense'&&(h>=21||h<5)});
  const nightSpend=nightTxs.reduce((s,t)=>s+t.amount,0);
  const nightPct=exp30>0?Math.round((nightSpend/exp30)*100):0;

  // ── Cat breakdown (30j) ──────────────────
  const catSpend={};
  w30.filter(t=>t.type==='expense').forEach(t=>{catSpend[t.categoryId]=(catSpend[t.categoryId]||0)+t.amount});
  const topCatId=Object.keys(catSpend).sort((a,b)=>catSpend[b]-catSpend[a])[0];
  const topCat=topCatId?catById(topCatId):null;

  // ── Compatibilité rétrograde (écrans qui lisent income/expense/discipline) ──
  const mt=monthTxs();
  const income=mt.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=mt.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const daysPassed=Math.max(1,now.getDate());
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const daysLeft=daysInMonth-daysPassed;
  const projExp=burnRate*daysInMonth;
  const projDelta=income-projExp;
  // Discipline = Rétention sur 30j (ou score basique si pas de revenu)
  const discipline=retention!==null?Math.min(100,Math.max(0,30+retention)):50;
  const stability=50; // gardé pour compatibilité, non utilisé dans les nouvelles alertes

  // ── SCORE DE FRICTION (Ivy) ──────────────
  // Mesure la cohérence entre tes dépenses et ton OBJECTIF prioritaire.
  // 100 = en ligne avec ton rêve. 0 = tu trahis ta trajectoire.
  // Composantes : (a) marge vs surplus requis, (b) dopamine, (c) nuit, (d) pression 7j
  let frictionScore=70; // neutre par défaut
  try{
    const pg=(typeof getPriorityGoal==='function')?getPriorityGoal():null;
    let alignment=70;
    if(pg && pg.deadline){
      const gap=pg.target-pg.saved;
      const joursDeadline=Math.max(1,Math.ceil((new Date(pg.deadline)-Date.now())/86400000));
      const surplusRequis=gap/joursDeadline;
      const surplusReel=Math.max(0,(inc30/30)-burnRate);
      // ratio >=1 = tu tiens le cap ; <1 = tu dérives
      const ratio=surplusRequis>0?surplusReel/surplusRequis:1;
      alignment=Math.max(0,Math.min(100,Math.round(ratio*70)));
    }
    // Pénalités comportementales (cerveau dérapant)
    const penDopamine=Math.max(0,(dopamineIdx-40))*0.4;   // au-delà de 40% ça pique
    const penNight   =Math.max(0,(nightPct  -15))*0.6;    // au-delà de 15% nuit
    const penPressure=Math.max(0,pressureIdx)*0.3;        // accélération récente
    frictionScore=Math.max(0,Math.min(100,Math.round(alignment - penDopamine - penNight - penPressure)));
  }catch(e){}

  return{
    // Comptes + flux prévu
    balance,activeBalance,savingsBalance,expectedIncome7d,
    // Méta historique
    dataDays,isShortHistory,isEndOfMonth,
    // Effet Fourmi
    antTotal,antCount,antThreshold:ANT_THRESHOLD,
    safetyDaysWithSavings,
    // Rolling
    inc7,exp7,inc30,exp30,
    // Core KPIs dynamiques
    burnRate,safetyDays,
    retention,pressureIdx,evaporationRate,
    dopamineIdx,investIdx,
    nightSpend,nightPct,
    // Catégories
    catSpend,topCat,
    // Rétrocompat écrans existants
    income,expense,discipline,stability,
    projDelta,projExp,daysLeft,daysInMonth,daysPassed,
    frictionScore
  };
}

function riskLevel(kpi){
  if(kpi.safetyDays<7||kpi.projDelta<-kpi.income*.3)return{l:t('risk_critical'),c:'var(--red)'};
  if(kpi.safetyDays<15||kpi.projDelta<0)return{l:t('risk_high'),c:'var(--org)'};
  if(kpi.safetyDays<30)return{l:t('risk_moderate'),c:'var(--ylw)'};
  return{l:t('risk_stable'),c:'var(--grn)'};
}

// Clé Groq dynamique (modifiable dans Config)
function getGroqKey(){
  return localStorage.getItem('groq_api_key')||'';
}

function buildCtx(){
  const k=computeKPIs();

  // ── 50 dernières transactions avec métadonnées comportementales ──
  const recentRaw=txs.slice(0,50).map(t=>{
    const d=new Date(t.date);
    return{
      montant:t.amount,
      type:t.type,
      categorie:catById(t.categoryId).name,
      heure:d.getHours(),
      jourSemaine:['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][d.getDay()],
      note:t.note||''
    };
  });

  // ── Analyse chrono : clusters horaires ──
  const hourBuckets={matin:[],apresmidi:[],soir:[],nuit:[]};
  recentRaw.filter(t=>t.type==='expense').forEach(t=>{
    if(t.heure>=6&&t.heure<12)hourBuckets.matin.push(t.montant);
    else if(t.heure>=12&&t.heure<18)hourBuckets.apresmidi.push(t.montant);
    else if(t.heure>=18&&t.heure<21)hourBuckets.soir.push(t.montant);
    else hourBuckets.nuit.push(t.montant);
  });
  const bucketSum=b=>b.reduce((s,v)=>s+v,0);

  // ── Détection de l'Effet Domino ──
  // Cherche si une grosse dépense (>2x burn rate) est suivie d'une hausse dans les 48h
  const BIG_TX_THRESHOLD=k.burnRate*2;
  const dominoEvents=[];
  txs.filter(t=>t.type==='expense'&&t.amount>BIG_TX_THRESHOLD).slice(0,5).forEach(big=>{
    const t0=new Date(big.date).getTime();
    const after48h=txs.filter(t=>t.type==='expense'&&new Date(t.date).getTime()>t0&&new Date(t.date).getTime()<=t0+172800000);
    if(after48h.length>=2){
      dominoEvents.push({
        declencheur:catById(big.categoryId).name,
        montant:big.amount,
        depensesSubsequentes:after48h.length,
        totalApres:after48h.reduce((s,t)=>s+t.amount,0)
      });
    }
  });

  // ── Mots-clés récurrents dans les notes ──
  const allNotes=txs.filter(t=>t.note&&t.note.length>2).map(t=>t.note.toLowerCase());
  const wordFreq={};
  allNotes.forEach(note=>note.split(/\s+/).forEach(w=>{if(w.length>3)wordFreq[w]=(wordFreq[w]||0)+1}));
  const topKeywords=Object.entries(wordFreq).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([w,n])=>`${w}(×${n})`);

  // ── Objectif prioritaire (deadline la plus proche) ──────────
  const pg=getPriorityGoal();
  let objectifPrioritaire=null;
  if(pg){
    const gap=pg.target-pg.saved;
    const dailySurplus=Math.max(0,(k.inc30/30)-k.burnRate);
    const joursRestantsBudget=dailySurplus>0?Math.ceil(gap/dailySurplus):null;
    const joursRestantsDeadline=pg.deadline?Math.ceil((new Date(pg.deadline)-Date.now())/86400000):null;
    const enRetard=joursRestantsBudget&&joursRestantsDeadline&&joursRestantsBudget>joursRestantsDeadline;
    objectifPrioritaire={
      nom:pg.name,
      cible:pg.target,
      epargneActuelle:pg.saved,
      gapRestant:gap,
      deadline:pg.deadline||'non définie',
      joursAvantDeadline:joursRestantsDeadline,
      joursNecessairesAuRythmeActuel:joursRestantsBudget,
      surplusJournalierDisponible:Math.round(dailySurplus),
      statut:enRetard?'EN RETARD — rythme insuffisant':'sur la trajectoire',
    };
  }

  // ── Tous les comptes (vue patrimoine totale) ──
  const allAccounts=accs.map(a=>({nom:a.name,type:a.type,solde:a.balance||0}));

  // ── Tous les objectifs (pas seulement le prioritaire) ──
  const allGoals=goals.map(g=>({
    nom:g.name,
    cible:g.target,
    epargne:g.saved||0,
    progression:g.target?Math.round(((g.saved||0)/g.target)*100)+'%':'0%',
    deadline:g.deadline||'aucune',
  }));

  // ── Top 5 catégories de dépense ce mois (avec montants) ──
  const monthExp=monthTxs().filter(t=>t.type==='expense');
  const catTotals={};
  monthExp.forEach(t=>{const n=catById(t.categoryId).name;catTotals[n]=(catTotals[n]||0)+t.amount});
  const topCategories=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).slice(0,5)
    .map(([n,v])=>`${n}: ${Math.round(v)} ${cur()}`);

  // ── Payload JSON structuré pour l'IA ──────
  const payload={
    devise:cur(),
    objectifPrioritaire,
    tousLesObjectifs:allGoals,
    comptes:allAccounts,
    indicateurs:{
      capitalActif:k.activeBalance,
      epargne:k.savingsBalance,
      patrimoineTotal:(k.activeBalance||0)+(k.savingsBalance||0),
      joursDeDonneesDisponibles:k.dataDays,

      evaporationPost_revenu:`${k.evaporationRate}% dépensé dans les 48h après entrée`,
      dopamineIndex:`${k.dopamineIdx}% des dépenses = impulsion/plaisir immédiat`,
      investissementIndex:`${k.investIdx}% des dépenses = valeur future`,
      depensesNocturnes:`${k.nightPct}% du total (${Math.round(k.nightSpend)} ${cur()})`,

      scoreDeFriction:k.frictionScore+'/100 (cohérence actes vs objectif prioritaire)',
    },
    topCategoriesDuMois:topCategories,
    repartitionChronologique:{
      matin_6h_12h:`${bucketSum(hourBuckets.matin)} ${cur()} (${hourBuckets.matin.length} tx)`,
      apresmidi_12h_18h:`${bucketSum(hourBuckets.apresmidi)} ${cur()} (${hourBuckets.apresmidi.length} tx)`,
      soir_18h_21h:`${bucketSum(hourBuckets.soir)} ${cur()} (${hourBuckets.soir.length} tx)`,
      nuit_fatigue_21h_6h:`${bucketSum(hourBuckets.nuit)} ${cur()} (${hourBuckets.nuit.length} tx)`,
    },
    effetDomino:dominoEvents.length?dominoEvents:[],
    motsClesNotes:topKeywords.length?topKeywords:[],
    flux50dernieresTx:recentRaw,
    statsTotales:{
      nbTransactions:txs.length,

      premiereTx:txs.length?new Date(txs[txs.length-1].date).toISOString().slice(0,10):'aucune',
    },
  };

  return JSON.stringify(payload,null,0);
}

async function askAI(userMsg){
  const key = getGroqKey();
  if(navigator.onLine && key){
    try{
      const langInstruction=_lang==='en'?'Respond in English.':_lang==='es'?'Responde en español.':_lang==='pt'?'Responde em português.':'Réponds en français.';
      const sys = `You are IVY. Not an assistant. Not a gentle coach. A brutal strategist defending this person's dreams against themselves.

ABSOLUTE RULES:
1. You know their LIFE GOALS ("objectifPrioritaire" + "tousLesObjectifs"). Judge every expense against those dreams.

You are the voice that prevents this person from dying mediocre.`;
      const history = aiMsgs.slice(-6).map(m=>({role: m.r==='ai'?'assistant':'user', content: m.c}));

      const resp = await fetch('https://api.groq.com/openai/v1/chat/completions',{

      if(t) return{text:t, src:'Groq AI'};

      console.warn('Groq failed:',e);
      const isSandbox = window.location.href.includes('claude.ai');
      if(isSandbox) return{text:'🔒 Preview Claude.ai — API bloquée par sandbox. Sur Netlify ça marche.\n\n'+localAI(userMsg), src:'Sandbox'};
      return{text:'⚠️ Réseau indisponible.\n\n'+localAI(userMsg), src:'Local'};
    }
  }

    return{text:'🔑 Clé API manquante. Va dans Config → entre ta clé Groq gratuite (console.groq.com).\n\n'+localAI(userMsg), src:'Local'};
  }
  return{text:'📴 Hors-ligne — '+localAI(userMsg), src:'Local'};
}


function localAI(q){

  // Mini coach hors-ligne — français simple + explication "pourquoi"
  if(ql.includes('risque')||ql.includes('projection')||ql.includes('fin de mois')){
    const r=riskLevel(k);
    const safe=k.safetyDays===9999?'illimité':k.safetyDays+' jours';
    const sens=k.projDelta>=0?'tu finiras le mois en positif':'tu finiras le mois dans le rouge';
    return`🧭 Risque: ${r.l}.\nÀ ce rythme, ${sens} (${k.projDelta>=0?'+':''}${fmtFull(k.projDelta)}).\nTu dépenses en moyenne ${fmtFull(k.burnRate)} par jour. Avec ce que tu as, tu tiens ${safe} sans nouveau revenu.\n💡 Pourquoi ça compte: ton cerveau sous-estime les petites dépenses répétées (biais de fragmentation). Cumulées, elles font le trou.`;
  }
  if(ql.includes('dépense')||ql.includes('catégorie')){
    if(!k.topCat)return'Aucune dépense ce mois pour le moment. Note la première dès que tu en fais une — ton cerveau oublie 60% des achats en 3 jours.';
    return`💸 Ta plus grosse catégorie ce mois: ${k.topCat.icon} ${k.topCat.name}.\nTotal dépensé: ${fmtFull(k.expense)} (${fmtFull(k.burnRate)}/jour en moyenne).\n💡 Pourquoi cette catégorie domine: c'est souvent là où ton cerveau cherche du plaisir rapide (dopamine). Réduire de 10% ici libère ${fmtFull(k.expense*0.1)} sans douleur.`;
  }
  if(ql.includes('solde')||ql.includes('patrimoine')||ql.includes('argent')){
    return`💰 Tu as ${fmtFull(k.activeBalance||k.balance)} disponibles + ${fmtFull(k.savingsBalance||0)} en épargne verrouillée.\nCe mois: ${fmtFull(k.income)} entrés, ${fmtFull(k.expense)} sortis.\nTu peux tenir ${k.safetyDays===9999?'longtemps':k.safetyDays+' jours'} sans rentrée d'argent.\n💡 L'épargne verrouillée est invisible pour ton cerveau, c'est volontaire — ça t'évite de la dépenser sur un coup de tête.`;
  }
  if(ql.includes('discipline')||ql.includes('score')){
    const txt=k.discipline<60?'Ton cerveau a besoin de routines. Note tes dépenses chaque soir — 30 secondes suffisent. C\'est ce qui crée le contrôle, pas les chiffres.':'Bon rythme. Continuer à noter, c\'est ce qui rend la suite automatique (les neurones renforcent l\'habitude après ~21 jours).';
    return`🎯 Discipline: ${k.discipline}/100.\nStabilité de tes revenus: ${Math.round(k.stability)}/100.\n💡 ${txt}`;
  }
  if(ql.includes('conseil')||ql.includes('améliorer')||ql.includes('aide')){
    const issues=[];
    if(k.burnRate>k.income/25)issues.push(`tu brûles ${fmtFull(k.burnRate)}/j, plus rapide que tes revenus`);
    if(k.projDelta<0)issues.push(`un déficit de ${fmtFull(Math.abs(k.projDelta))} arrive en fin de mois`);
    if(k.discipline<60)issues.push('tu notes tes dépenses de façon irrégulière');
    if(k.dopamineIdx>50)issues.push(`${k.dopamineIdx}% de tes dépenses sont du plaisir immédiat (dopamine)`);
    if(k.nightPct>15)issues.push(`${k.nightPct}% de tes dépenses sont la nuit (fatigue décisionnelle)`);
    if(!issues.length)return`✅ Tout va bien. Tu brûles ${fmtFull(k.burnRate)}/j, c'est sous contrôle.\n💡 Conseil: profite-en pour augmenter ton épargne automatique de 5%. Ton cerveau ne sentira pas la différence.`;
    return`👀 Points à regarder:\n• ${issues.join('\n• ')}\n💡 Choisis-en UN seul à corriger cette semaine. Le cerveau ne change qu'une habitude à la fois — sinon il abandonne tout.`;
  }
  return`📊 État rapide:\n• Disponible: ${fmtFull(k.activeBalance||k.balance)}\n• Dépensé ce mois: ${fmtFull(k.expense)}\n• Discipline: ${k.discipline}/100\n💡 Pose une question précise (risque, dépenses, conseil, solde, discipline) — je t'expliquerai aussi le "pourquoi".`;
}

// ALERTES COMPORTEMENTALES (Nudges)
// Basées sur les indicateurs dynamiques,
// pas sur le calendrier mensuel.
// ════════════════════════════════════════
function getAlerts(kpi){
  // Pool large d'alertes possibles — on en montre 2-3 max, rotation journalière
  const pool=[];

  // — Critiques (toujours prioritaires, jamais en rotation) —
  const critical=[];
  if(!txs.length){
    return [{t:'i',m:`📝 Aucune transaction encore. Tape le <strong>+</strong> pour saisir ta première — sans données je peux rien analyser.`}];
  }
  if(kpi.isShortHistory){
    pool.push({t:'i',m:`📅 Tu as ${kpi.dataDays} jour${kpi.dataDays>1?'s':''} de données. Les analyses se calent là-dessus — la pression vs habitude attendra ${14-kpi.dataDays}j de plus pour avoir du sens.`,prio:1});
  }
  if(kpi.safetyDays!==9999&&kpi.safetyDays<7){
    const ext=kpi.safetyDaysWithSavings>kpi.safetyDays?` Avec ton épargne tu montes à <strong>${kpi.safetyDaysWithSavings}j</strong>.`:'';
    critical.push({t:'d',m:`🚨 ${kpi.safetyDays} jour${kpi.safetyDays>1?'s':''} d'argent actif si rien n'entre.${ext} Tu brûles ${fmtFull(kpi.burnRate)}/j. Coupe une dépense aujourd'hui.`});
  }
  if(!kpi.isShortHistory && kpi.pressureIdx>40)
    critical.push({t:'d',m:`🔥 +${kpi.pressureIdx}% cette semaine vs ton habitude. Effet "spirale" — ton cerveau s'habitue. Pause de 24h sur le non essentiel.`});
  if(kpi.isEndOfMonth)
    critical.push({t:'w',m:`🌒 Mode fin de mois actif. La fatigue de décision s'accumule — tes prochains achats coûtent plus cher au cerveau qu'en début de mois.`});

  // — Pool rotatif (chacune éligible si condition remplie) —
  if(!kpi.isShortHistory && kpi.pressureIdx>20 && kpi.pressureIdx<=40)
    pool.push({t:'w',m:`⚠️ +${kpi.pressureIdx}% de dépenses cette semaine vs habitude. Pas grave si prévu — sinon, freine doucement.`,prio:2});
  if(kpi.exp7>kpi.inc7 && kpi.inc7>0)
    pool.push({t:'w',m:`📉 Cette semaine: ${fmtFull(kpi.exp7)} sortis vs ${fmtFull(kpi.inc7)} entrés. Tu vis sur la réserve.`,prio:2});
  if(kpi.evaporationRate>50)
    pool.push({t:'w',m:`💸 ${kpi.evaporationRate}% de chaque revenu disparaît en 48h. Astuce : vire 20% en épargne dès l'entrée.`,prio:3});
  if(kpi.nightPct>20)
    pool.push({t:'w',m:`🌙 ${kpi.nightPct}% de tes dépenses après 21h. Cortex fatigué = oui facile. Délai de 12h sur les achats tard.`,prio:3});
  if(kpi.dopamineIdx>60)
    pool.push({t:'w',m:`🎯 ${kpi.dopamineIdx}% de tes dépenses = plaisir immédiat. Seulement ${kpi.investIdx}% vers le futur. L'équilibre 50/50 dure plus longtemps.`,prio:3});
  if(kpi.antCount>=10 && kpi.antTotal>=kpi.antThreshold*5)
    pool.push({t:'i',m:`🐜 Effet Fourmi : ${kpi.antCount} petites dépenses (≤${fmtFull(kpi.antThreshold)}) = <strong>${fmtFull(kpi.antTotal)}</strong> sur ${kpi.dataDays}j. Invisible à l'œil, lourd au cumul.`,prio:3});
  if(kpi.retention!==null && kpi.retention>=25 && kpi.pressureIdx<=10)
    pool.push({t:'g',m:`✅ Tu gardes ${kpi.retention}% de ce qui entre. ${kpi.safetyDays===9999?'Tu tiens très longtemps':'Tu tiens '+kpi.safetyDays+'j'} sans nouveau revenu.`,prio:3});
  if(!kpi.isShortHistory && kpi.pressureIdx<=-15)
    pool.push({t:'g',m:`📉 Dépenses ${Math.abs(kpi.pressureIdx)}% sous ta moyenne cette semaine. Profite — c'est le moment où le cerveau accepte une nouvelle automatisation d'épargne.`,prio:3});
  // Détection licence morale : 7j de bonne rétention puis aujourd'hui ça dérape
  if(kpi.retention!==null && kpi.retention>=70 && kpi.exp7>0){
    const todayExp=txs.filter(t=>t.type==='expense'&&new Date(t.date).toDateString()===new Date().toDateString()).reduce((s,t)=>s+t.amount,0);
    if(todayExp>kpi.burnRate*1.5)
      pool.push({t:'w',m:`🪞 Tu as bien tenu cette semaine. Aujourd'hui : ${fmtFull(todayExp)} sortis (${Math.round(todayExp/kpi.burnRate)}× ta moyenne). C'est la "licence morale" — quand on se récompense d'avoir été sage.`,prio:1});
  }

  // Rotation : seed = jour de l'année → ordre stable dans la journée mais change demain
  const seed=Math.floor(Date.now()/86400000);
  const shuffled=pool.map((a,i)=>({a,r:((seed+i*31)%97)})).sort((x,y)=>x.a.prio-y.a.prio||x.r-y.r).map(x=>x.a);

  // Max 3 alertes : critiques d'abord, puis 1-2 du pool rotatif
  const out=[...critical];
  for(const a of shuffled){
    if(out.length>=3) break;
    out.push(a);
  }
  return out.length?out:[{t:'g',m:`✅ Rien d'urgent. Burn rate ${fmtFull(kpi.burnRate)}/j, safety ${kpi.safetyDays===9999?'∞':kpi.safetyDays}j. Profites-en pour avancer ton objectif.`}];
}

function sendNotif(title,body,tag){
  if(Notification.permission!=='granted')return;
  const opts={
    body,
    tag:tag||'finos',
    icon:'./icon-192.png',
    badge:'./icon-96.png',
    vibrate:[200,100,200,100,300],  // son + vibration sur Android
    requireInteraction:false,
    silent:false,
    data:{url:'./index.html'}
  };
  // Priorité SW (fonctionne en arrière-plan, lock screen, son réel)
  if('serviceWorker' in navigator && navigator.serviceWorker.controller){
    navigator.serviceWorker.ready.then(reg=>{
      reg.showNotification(title,opts);
    }).catch(()=>{ try{new Notification(title,{body,tag,silent:false})}catch(e){} });
  } else {
    // Fallback direct (app ouverte seulement)
    try{ new Notification(title,{body,tag,icon:'./icon-192.png',silent:false}) }catch(e){}
  }
}
function checkNotifs(){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  const now=new Date(),h=now.getHours(),m=now.getMinutes(),today=now.toDateString();
  const kpi=computeKPIs();

  // ── 1. Rappel saisie journalière ─────────────────────────────
  const rh=parseInt(settings.remindHour||20);
  if(h===rh&&m<5){
    const todayTxs=txs.filter(t=>new Date(t.date).toDateString()===today);
    if(!todayTxs.length)sendNotif('Finance AI OS','✋ Aucune transaction aujourd\'hui. Mets à jour.','daily');
  }

  // ── 2. Réserve critique ──────────────────────────────────────
  if(kpi.safetyDays!==9999&&kpi.safetyDays<5&&h===8&&m<5){
    const k='safetyAlert'+today;
    if(!localStorage.getItem(k)){sendNotif('🚨 Réserve critique',`${kpi.safetyDays} jours de réserve au rythme actuel.`,'safety');localStorage.setItem(k,'1')}
  }

  // ── 3. Surchauffe court terme ────────────────────────────────
  if(kpi.pressureIdx>35&&h===12&&m<5){
    const k='pressureAlert'+today;
    if(!localStorage.getItem(k)){sendNotif('🔥 Surchauffe détectée',`Tes dépenses cette semaine sont +${kpi.pressureIdx}% vs ton habitude. Contrôle.`,'pressure');localStorage.setItem(k,'1')}
  }

  // ── 4. Sentinelle "Fenêtre de risque" ────────────────────────
  // Basée sur les patterns horaires réels (nightPct élevé = risque le soir)
  // On prévient 1h avant la zone à risque détectée
  if(kpi.nightPct>20){
    // L'utilisateur dépense souvent après 21h → alerte à 20h
    if(h===20&&m<5){
      const k='riskWindow'+today;
      const pg=getPriorityGoal();
      const body=pg
        ? `Fenêtre de risque d'impulsion approche. Rappelle-toi : "${pg.name}" — il manque encore ${fmtFull(pg.target-pg.saved)}.`
        : `Tes dépenses nocturnes représentent ${kpi.nightPct}% de ton total. Reste vigilant ce soir.`;
      if(!localStorage.getItem(k)){sendNotif('🌙 Fenêtre de risque',body,'riskWindow');localStorage.setItem(k,'1')}
    }
  }

  // ── 5. Objectif en retard — alerte matinale ──────────────────
  if(h===7&&m<5){
    const pg=getPriorityGoal();
    if(pg&&pg.deadline){
      const joursDeadline=Math.ceil((new Date(pg.deadline)-Date.now())/86400000);
      const gap=pg.target-pg.saved;
      const dailySurplus=Math.max(0,(kpi.inc30/30)-kpi.burnRate);
      const joursNecessaires=dailySurplus>0?Math.ceil(gap/dailySurplus):null;
      if(joursNecessaires&&joursNecessaires>joursDeadline){
        const k='goalAlert'+today;
        if(!localStorage.getItem(k)){
          sendNotif(`⏳ "${pg.name}" en retard`,`Il te faut ${joursNecessaires}j au rythme actuel mais la deadline est dans ${joursDeadline}j.`,'goalAlert');
          localStorage.setItem(k,'1');
        }
      }
    }
  }

  // ── 6. Bilan de cohérence du soir ───────────────────────────
  if(h===22&&m<5){
    const pg=getPriorityGoal();
    if(pg){
      const todayDopamine=txs.filter(t=>{
        const d=new Date(t.date);
        return t.type==='expense'&&isDopamineTx(t)&&d.toDateString()===today;
      }).reduce((s,t)=>s+t.amount,0);
      if(todayDopamine>0){
        const days=opportunityCostDays(todayDopamine);
        const k='coherence'+today;
        if(!localStorage.getItem(k)&&days&&days>=0.5){
          sendNotif('📊 Bilan du jour',`${fmtFull(todayDopamine)} en dépenses impulsion aujourd'hui = ${days}j de retard sur "${pg.name}".`,'coherence');
          localStorage.setItem(k,'1');
        }
      }
    }
  }
}

function timeOf(amt){
  const r=parseFloat(settings.hourlyRate)||0;
  if(!r||!amt) return '';
  const h=amt/r;
  if(h<1) return Math.round(h*60)+'min';
  if(h<8) return h.toFixed(1).replace('.0','')+'h';
  const d=h/8;
  if(d<5) return d.toFixed(1).replace('.0','')+'j travail';
  return Math.round(d)+'j travail';
}

let analyticsPeriod='month'; // 'day','week','month','year'

function getPeriodTxs(period){
  const now=new Date();
  let s,e;
  if(period==='day'){s=new Date(now);s.setHours(0,0,0,0);e=new Date(now);e.setHours(23,59,59,999);}
  else if(period==='week'){s=new Date(now);s.setDate(now.getDate()-now.getDay());s.setHours(0,0,0,0);e=new Date(now);e.setHours(23,59,59,999);}
  else if(period==='month'){s=new Date(now.getFullYear(),now.getMonth(),1);e=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59);}
  else{s=new Date(now.getFullYear(),0,1);e=new Date(now.getFullYear(),11,31,23,59,59);}
  return txs.filter(t=>new Date(t.date)>=s&&new Date(t.date)<=e);
}

function getPrevPeriodTxs(period){
  const now=new Date();
  let s,e;
  if(period==='day'){s=new Date(now);s.setDate(s.getDate()-1);s.setHours(0,0,0,0);e=new Date(s);e.setHours(23,59,59,999);}
  else if(period==='week'){s=new Date(now);s.setDate(now.getDate()-now.getDay()-7);s.setHours(0,0,0,0);e=new Date(s);e.setDate(s.getDate()+6);e.setHours(23,59,59,999);}
  else if(period==='month'){s=new Date(now.getFullYear(),now.getMonth()-1,1);e=new Date(now.getFullYear(),now.getMonth(),0,23,59,59);}
  else{s=new Date(now.getFullYear()-1,0,1);e=new Date(now.getFullYear()-1,11,31,23,59,59);}
  return txs.filter(t=>new Date(t.date)>=s&&new Date(t.date)<=e);
}

function periodPrevLabel(p){return {day:'hier',week:'sem. passée',month:'mois passé',year:'an passé'}[p]}

// Heatmap adaptative : day=24h / week=7j / month=daysInMonth / year=12mois
function buildHeatmap(period){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  const cells=[];let max=1;
  if(period==='day'){
    const today=new Date(y,m,now.getDate());
    for(let h=0;h<24;h++){
      const s=new Date(today);s.setHours(h,0,0,0);
      const e=new Date(s);e.setHours(h+1);
      const amt=txs.filter(t=>t.type==='expense'&&new Date(t.date)>=s&&new Date(t.date)<e).reduce((a,t)=>a+t.amount,0);
      const isNow=h===now.getHours();
      cells.push({label:String(h).padStart(2,'0')+'h',short:String(h),amt,isNow,key:`hour-${h}`});
      if(amt>max)max=amt;
    }
  } else if(period==='week'){
    const start=new Date(now);start.setDate(now.getDate()-now.getDay());start.setHours(0,0,0,0);
    const wn=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    for(let i=0;i<7;i++){
      const s=new Date(start);s.setDate(start.getDate()+i);
      const e=new Date(s);e.setDate(s.getDate()+1);
      const amt=txs.filter(t=>t.type==='expense'&&new Date(t.date)>=s&&new Date(t.date)<e).reduce((a,t)=>a+t.amount,0);
      const isNow=s.toDateString()===now.toDateString();
      cells.push({label:wn[i],short:wn[i],amt,isNow,key:`day-${s.toISOString().slice(0,10)}`,date:s});
      if(amt>max)max=amt;
    }
  } else if(period==='month'){
    const dim=new Date(y,m+1,0).getDate();
    for(let d=1;d<=dim;d++){
      const s=new Date(y,m,d),e=new Date(y,m,d+1);
      const amt=txs.filter(t=>t.type==='expense'&&new Date(t.date)>=s&&new Date(t.date)<e).reduce((a,t)=>a+t.amount,0);
      const isNow=d===now.getDate();
      cells.push({label:String(d),short:String(d),amt,isNow,key:`day-${s.toISOString().slice(0,10)}`,date:s});
      if(amt>max)max=amt;
    }
  } else { // year
    const mn=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Aoû','Sep','Oct','Nov','Déc'];
    for(let mm=0;mm<12;mm++){
      const s=new Date(y,mm,1),e=new Date(y,mm+1,1);
      const amt=txs.filter(t=>t.type==='expense'&&new Date(t.date)>=s&&new Date(t.date)<e).reduce((a,t)=>a+t.amount,0);
      const isNow=mm===now.getMonth();
      cells.push({label:mn[mm],short:mn[mm],amt,isNow,key:`month-${y}-${mm}`,date:s});
      if(amt>max)max=amt;
    }
  }
  return {cells,max};
}

// Couleur nuancée selon intensité : vert (calme) → jaune → orange → rouge (intense)
function intensityColor(ratio){
  if(ratio<=0)return 'var(--surf2)';
  if(ratio<.25)return `rgba(16,185,129,${.20+ratio*.6})`;
  if(ratio<.5)return `rgba(234,179,8,${.25+ratio*.5})`;
  if(ratio<.75)return `rgba(249,115,22,${.30+ratio*.5})`;
  return `rgba(244,63,94,${.35+ratio*.55})`;
}

  if(period==='day') return openHourModal(cell);

  if(period==='year') return openMonthModal(cell.date.getMonth(),cell.date.getFullYear());
}

function localPeriodComment(p,d){
  const lbl=periodLabel(p),prev=periodPrevLabel(p);
  if(d.curExp===0&&d.curInc===0) return `Aucune donnée ${lbl}. Saisis tes mouvements pour activer l'analyse.`;
  const parts=[];
  if(d.curExp>0&&d.prevExp>0){
    if(d.expDpct>30) parts.push(`🔥 Dépenses en hausse de <strong>+${d.expDpct}%</strong> vs ${prev}. Le cerveau s'habitue à dépenser plus — c'est l'effet d'inertie.`);
    else if(d.expDpct<-20) parts.push(`✅ Dépenses en baisse de <strong>${d.expDpct}%</strong> vs ${prev}. Bonne maîtrise.`);
    else parts.push(`Rythme stable vs ${prev} (${d.expDpct>=0?'+':''}${d.expDpct}%).`);
  } else if(d.curExp>0){
    parts.push(`${fmtFull(d.curExp)} dépensés ${lbl}.`);
  }
  if(d.curInc>0&&d.curExp>d.curInc) parts.push(`⚠️ Tu dépenses plus que tu ne gagnes ${lbl}. Solde négatif: ${fmtFull(d.curInc-d.curExp)}.`);
  if(d.topCat) parts.push(`Top catégorie: ${catById(d.topCat[0]).icon} <strong>${catById(d.topCat[0]).name}</strong> (${fmtFull(d.topCat[1])}).`);
  return parts.join(' ');
}

  if(!navigator.onLine||!getGroqKey()) return;
  const elId='periodInsight_'+p;
  const el=document.getElementById(elId);if(!el) return;
  const status=document.getElementById(elId+'_status');
  if(status) status.textContent='Groq…';
  const ptxs=getPeriodTxs(p);
  const prevTxs=getPrevPeriodTxs(p);
  const curExp=ptxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const curInc=ptxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const prevExp=prevTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const catSpendP={};ptxs.filter(t=>t.type==='expense').forEach(t=>{catSpendP[t.categoryId]=(catSpendP[t.categoryId]||0)+t.amount});
  const top=Object.entries(catSpendP).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([id,v])=>catById(id).name+':'+Math.round(v));
  const prompt=`Tu es Ivy, coach financier neuro. Analyse en français, 2-3 phrases max, ton brutal mais utile.
Période: ${periodLabel(p)}. Devise: ${cur()}.
Dépenses ${periodLabel(p)}: ${Math.round(curExp)} | ${periodPrevLabel(p)}: ${Math.round(prevExp)}.
Revenus ${periodLabel(p)}: ${Math.round(curInc)}.
Top dépenses: ${top.join(', ')||'aucune'}.
Donne UNE observation neuro/comportementale + UNE action concrète.`;
  try{
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+getGroqKey()},
      body:JSON.stringify({model:'llama-3.1-8b-instant',max_tokens:180,temperature:.7,messages:[{role:'user',content:prompt}]})
    });

    const txt=j.choices?.[0]?.message?.content;
    if(txt&&el){el.innerHTML='💡 '+txt.trim();if(status)status.textContent='Groq';}
  }catch(e){if(status)status.textContent='IA locale (offline)';}
}

function renderTrendChartAdaptive(p,ptxs){
  // Day = 24 points (heures), Week = 7 points (jours), Month = jours du mois, Year = 12 points (mois)
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  let buckets=[],labels=[];
  if(p==='day'){
    for(let h=0;h<24;h++){
      const s=new Date(y,m,now.getDate(),h),e=new Date(y,m,now.getDate(),h+1);
      const dt=ptxs.filter(t=>new Date(t.date)>=s&&new Date(t.date)<e);
      buckets.push({exp:dt.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0),inc:dt.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0),lbl:h+'h'});
    }
  } else if(p==='week'){
    const start=new Date(now);start.setDate(now.getDate()-now.getDay());start.setHours(0,0,0,0);
    const wn=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    for(let i=0;i<7;i++){
      const s=new Date(start);s.setDate(start.getDate()+i);const e=new Date(s);e.setDate(s.getDate()+1);
      const dt=ptxs.filter(t=>new Date(t.date)>=s&&new Date(t.date)<e);
      buckets.push({exp:dt.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0),inc:dt.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0),lbl:wn[i]});
    }
  } else if(p==='month'){
    const dim=new Date(y,m+1,0).getDate();
    for(let d=1;d<=dim;d++){
      const s=new Date(y,m,d),e=new Date(y,m,d+1);
      const dt=ptxs.filter(t=>new Date(t.date)>=s&&new Date(t.date)<e);
      buckets.push({exp:dt.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0),inc:dt.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0),lbl:d});
    }
  } else {
    const mn=['J','F','M','A','M','J','J','A','S','O','N','D'];
    for(let mm=0;mm<12;mm++){
      const s=new Date(y,mm,1),e=new Date(y,mm+1,1);
      const dt=ptxs.filter(t=>new Date(t.date)>=s&&new Date(t.date)<e);
      buckets.push({exp:dt.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0),inc:dt.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0),lbl:mn[mm]});
    }
  }
  const max=Math.max(...buckets.map(x=>Math.max(x.exp,x.inc)),1);
  const W=320,H=150,pad=24,n=buckets.length;
  const xs=i=>pad+((W-pad*2)*i/Math.max(1,n-1));
  const ys=v=>H-pad-((H-pad*2)*v/max);
  const ptsExp=buckets.map((p,i)=>xs(i)+','+ys(p.exp)).join(' ');
  const ptsInc=buckets.map((p,i)=>xs(i)+','+ys(p.inc)).join(' ');
  const areaExp=`M${xs(0)},${H-pad} L${ptsExp.split(' ').join(' L')} L${xs(n-1)},${H-pad} Z`;
  const lineExp='M'+ptsExp.split(' ').join(' L');
  const lineInc='M'+ptsInc.split(' ').join(' L');
  const avg=buckets.reduce((s,p)=>s+p.exp,0)/n;
  const yAvg=ys(avg);
  return`<div class="card">
    <div class="ch">📊 Tendance — ${periodLabel(p)} <span class="tm" style="font-weight:600">moy ${fmtFull(avg)}</span></div>
    <div style="display:flex;gap:14px;font-size:10px;color:var(--mut);margin-bottom:6px;font-weight:700;text-transform:uppercase">
      <span><span style="display:inline-block;width:10px;height:3px;background:var(--acc3);vertical-align:middle;margin-right:4px"></span>Sorties</span>
      <span><span style="display:inline-block;width:10px;height:3px;background:var(--grn);vertical-align:middle;margin-right:4px"></span>Entrées</span>
    </div>
    <svg class="trend-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:150px">
      <defs><linearGradient id="trendGrad" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="var(--acc3)" stop-opacity=".35"/>
        <stop offset="100%" stop-color="var(--acc3)" stop-opacity="0"/>
      </linearGradient></defs>

function saveGroqKey(){
  const k = document.getElementById('new-groq-key')?.value.trim();
  if(!k || !k.startsWith('gsk_')){alert('Clé invalide. Elle doit commencer par gsk_...');return}
  localStorage.setItem('groq_api_key', k);
  alert('✅ Clé Groq enregistrée! L\'IA est maintenant active.');
  render();
}
function clearGroqKey(){
  if(!confirm('Supprimer la clé Groq?'))return;
  localStorage.removeItem('groq_api_key');
  render();
}
async function testGroqKey(){
  const el = document.getElementById('groq-test-result');
  if(!el)return;
  el.style.display='block';
  el.style.background='var(--surf2)';
  el.style.color='var(--mut)';
  el.textContent='⏳ Test en cours...';
  const key = getGroqKey();
  if(!key){el.textContent='❌ Aucune clé. Entre une clé gsk_...';el.style.color='var(--red)';return}
  try{
    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'llama-3.1-8b-instant',max_tokens:20,messages:[{role:'user',content:'Réponds juste: OK'}]})
    });
    const d = await resp.json();
    if(resp.ok && d.choices?.[0]?.message?.content){
      el.style.background='rgba(16,185,129,.15)';
      el.style.color='var(--grn)';
      el.textContent='✅ Clé valide! Groq AI opérationnel. Modèle: llama-3.1-8b-instant';
    } else {
      el.style.background='rgba(244,63,94,.15)';
      el.style.color='var(--red)';
      el.textContent='❌ '+(d.error?.message||'Erreur inconnue');
    }
  }catch(e){
    el.style.background='rgba(244,63,94,.15)';
    el.style.color='var(--red)';
    el.textContent='❌ Réseau indisponible. Vérifie ta connexion.';
  }
}


function renderTrendChart(){
  const days=14;
  const now=new Date();
  const data=[];
  for(let i=days-1;i>=0;i--){
    const d=new Date(now);d.setHours(0,0,0,0);d.setDate(d.getDate()-i);
    const next=new Date(d);next.setDate(d.getDate()+1);
    const dayTx=txs.filter(t=>new Date(t.date)>=d&&new Date(t.date)<next);
    const exp=dayTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const inc=dayTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    data.push({d,exp,inc});
  }
  const max=Math.max(...data.map(x=>Math.max(x.exp,x.inc)),1);
  const W=320,H=150,pad=24;
  const xs=i=>pad+((W-pad*2)*i/(days-1));
  const ys=v=>H-pad-((H-pad*2)*v/max);
  const ptsExp=data.map((p,i)=>xs(i)+','+ys(p.exp)).join(' ');
  const ptsInc=data.map((p,i)=>xs(i)+','+ys(p.inc)).join(' ');
  const areaExp=`M${xs(0)},${H-pad} L${ptsExp.split(' ').join(' L')} L${xs(days-1)},${H-pad} Z`;
  const lineExp='M'+ptsExp.split(' ').join(' L');
  const lineInc='M'+ptsInc.split(' ').join(' L');
  const avg=data.reduce((s,p)=>s+p.exp,0)/days;
  const yAvg=ys(avg);
  // Mini explication automatique en français simple
  const lastWeekAvg=data.slice(-7).reduce((s,p)=>s+p.exp,0)/7;
  const prevWeekAvg=data.slice(0,7).reduce((s,p)=>s+p.exp,0)/7;
  const diffPct=prevWeekAvg>0?Math.round((lastWeekAvg-prevWeekAvg)/prevWeekAvg*100):0;
  const expl=diffPct>10?`📈 Tu dépenses ${diffPct}% de plus cette semaine que la précédente. Le cerveau augmente sans s'en rendre compte (effet de récence).`
    :diffPct<-10?`📉 Tu dépenses ${Math.abs(diffPct)}% de moins cette semaine. Bon contrôle, continue.`
    :`➡️ Tes dépenses sont stables sur les 14 jours.`;
  return`<div class="card">
    <div class="ch">📊 14 derniers jours <span class="tm" style="font-weight:600">moy ${fmtFull(avg)}/j</span></div>
    <div style="display:flex;gap:14px;font-size:10px;color:var(--mut);margin-bottom:6px;font-weight:700;text-transform:uppercase">
      <span><span style="display:inline-block;width:10px;height:3px;background:var(--acc3);vertical-align:middle;margin-right:4px"></span>Sorties</span>
      <span><span style="display:inline-block;width:10px;height:3px;background:var(--grn);vertical-align:middle;margin-right:4px"></span>Entrées</span>
    </div>
    <svg class="trend-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:150px">
      <defs><linearGradient id="trendGrad" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="var(--acc3)" stop-opacity=".35"/>
        <stop offset="100%" stop-color="var(--acc3)" stop-opacity="0"/>
      </linearGradient></defs>
      <line class="axis" x1="${pad}" y1="${yAvg}" x2="${W-pad}" y2="${yAvg}"/>
      <text class="lbl" x="${W-pad}" y="${yAvg-3}" text-anchor="end">moy</text>
      <path class="area" d="${areaExp}"/>
      <path class="line" d="${lineExp}"/>
      <path d="${lineInc}" fill="none" stroke="var(--grn)" stroke-width="2" stroke-dasharray="4 3" stroke-linejoin="round" stroke-linecap="round"/>
      ${data.map((p,i)=>`<circle class="pt" cx="${xs(i)}" cy="${ys(p.exp)}" r="2.5"><title>${p.d.toLocaleDateString(getLocale(),{day:'numeric',month:'short'})}: ${fmtFull(p.exp)} sorti, ${fmtFull(p.inc)} entré</title></circle>`).join('')}
      <text class="lbl" x="${pad}" y="${H-6}">${data[0].d.getDate()}/${data[0].d.getMonth()+1}</text>
      <text class="lbl" x="${W-pad}" y="${H-6}" text-anchor="end">aujourd'hui</text>
    </svg>
    <div style="font-size:11px;color:var(--txt2);margin-top:8px;line-height:1.5;padding:8px 10px;background:var(--surf2);border-radius:8px">${expl}</div>
  </div>
  ${renderCategoryBars()}`;
}

function scoreRing(s,label,color){
  const r=26,c=2*Math.PI*r,fill=c-(c*Math.min(100,s)/100);
  return`<div class="sring">
    <svg width="66" height="66" viewBox="0 0 66 66">
      <circle cx="33" cy="33" r="${r}" fill="none" stroke="var(--surf3)" stroke-width="4"/>
      <circle cx="33" cy="33" r="${r}" fill="none" stroke="${color}" stroke-width="4" stroke-dasharray="${c}" stroke-dashoffset="${fill}" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset .8s ease"/>
      <text x="33" y="38" text-anchor="middle" fill="${color}" font-size="13" font-weight="800" font-family="Roboto Mono,monospace">${s}</text>
    </svg>
    <div style="font-size:10px;color:var(--mut);font-weight:700;text-transform:uppercase">${label}</div>
  </div>`;
}

function setupChat(){
  const ca=$('chatArea'),sb=$('sendBtn'),ci=$('chatInput');
  if(ca)ca.scrollTop=ca.scrollHeight;
  if(!sb||!ci)return;
  async function send(){
    const q=ci.value.trim();if(!q||aiTyping)return;
    ci.value='';
    aiMsgs.push({r:'user',c:q});aiTyping=true;render();
    try{const res=await askAI(q);aiMsgs.push({r:'ai',c:res.text,src:res.src})}
    catch(e){aiMsgs.push({r:'ai',c:localAI(q),src:'Local'})}
    aiTyping=false;render();
  }
  sb.onclick=send;
  ci.onkeydown=e=>{if(e.key==='Enter')send()};
}
function quickAsk(q){const ci=$('chatInput');if(ci){ci.value=q;$('sendBtn')&&$('sendBtn').click()}}

// Catégories considérées comme "dopamine" pour le coût d'opportunité
// 'food' exclu par défaut — réintégré ponctuellement via mots-clés (snack, livraison, etc.)
const DOPAMINE_CATS=['leisure','clothes','unforeseen','other_exp'];
const FOOD_IMPULSE_RE=/snack|fast.?food|livraison|delivery|resto|burger|pizza|glace|bonbon/i;
function isDopamineTx(t){return DOPAMINE_CATS.includes(t.categoryId)||(t.categoryId==='food'&&t.note&&FOOD_IMPULSE_RE.test(t.note))}

function getPriorityGoal(){
  // Objectif prioritaire = non atteint, avec deadline la plus proche
  const active=goals.filter(g=>g.saved<g.target&&g.deadline);
  if(!active.length) return goals.find(g=>g.saved<g.target)||null;
  return active.sort((a,b)=>new Date(a.deadline)-new Date(b.deadline))[0];
}

function opportunityCostDays(amt){
  // Combien de jours de progression vers l'objectif cette somme représente-t-elle ?
  const g=getPriorityGoal();if(!g) return null;
  const gap=g.target-g.saved;if(gap<=0) return null;
  const k=computeKPIs();
  // Surplus journalier disponible pour épargner = revenus 30j/30 - burnRate
  const dailySurplus=Math.max(0,(k.inc30/30)-k.burnRate);
  if(dailySurplus<=0) return null;
  // Combien de jours de surplus = cette dépense ?
  return Math.round(amt/dailySurplus*10)/10;
}

// ════════════════════════════════════════
// COMPTEUR DE DESTIN — date d'atteinte de l'objectif
// ════════════════════════════════════════
function goalMonthly(g){
  // Découpe l'objectif en jalon mensuel : combien doit être épargné CE mois pour rester sur trajectoire
  if(!g||!g.deadline) return null;
  const gap=g.target-(g.saved||0);
  if(gap<=0) return {done:true};
  const now=new Date();
  const deadline=new Date(g.deadline);
  const monthsLeft=Math.max(1,(deadline.getFullYear()-now.getFullYear())*12+(deadline.getMonth()-now.getMonth())+1);
  const monthlyTarget=Math.ceil(gap/monthsLeft);
  // Ce qui a été épargné CE MOIS
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
  const savedThisMonth=(g.deposits||[]).filter(d=>new Date(d.date)>=monthStart).reduce((s,d)=>s+d.amount,0);
  const pct=Math.min(100,Math.round((savedThisMonth/monthlyTarget)*100));
  return {monthlyTarget,savedThisMonth,pct,monthsLeft,done:false};
}
function goalETA(g){
  if(!g) return null;
  const gap=g.target-(g.saved||0);
  if(gap<=0) return {done:true,date:null,days:0};
  const k=computeKPIs();
  const dailySurplus=Math.max(0,(k.inc30/30)-k.burnRate);
  if(dailySurplus<=0) return {done:false,date:null,days:null,impossible:true};
  const days=Math.ceil(gap/dailySurplus);
  const date=new Date(Date.now()+days*86400000);
  return {done:false,date,days,impossible:false};
}

// ════════════════════════════════════════
// IVY — INTERVENTION PROACTIVE après une dépense
// ════════════════════════════════════════
function ivyVerdict({amt,catId,mood,location,hour}){
  const g=getPriorityGoal();
  const days=opportunityCostDays(amt);
  const isDopamine=DOPAMINE_CATS.includes(catId) || (catId==='food' && /snack|fast.?food|livraison|delivery|resto|burger|pizza/i.test(arguments[0].note||''));
  const isNight=hour>=21||hour<5;
  const tiredMood=['😫','😡','😴'].includes(mood);
  const triggers=[];
  if(isDopamine && days!==null && days>=0.5) triggers.push('opportunité');
  if(isNight) triggers.push('nuit');
  if(tiredMood) triggers.push('humeur');
  if(location && location.length>1) triggers.push('lieu');
  if(triggers.length<1) return null; // pas d'intervention
  const cat=catById(catId);
  const lines=[];
  if(g && days!==null && days>=0.5){
    const unit=days>=1?`${days} jour${days>1?'s':''}`:`${Math.round(days*24)} heures`;
    lines.push(`⚡ Tu viens de repousser <strong>"${g.name}"</strong> de <strong>${unit}</strong>. Pour ${cat.name.toLowerCase()}.`);
  }
  if(tiredMood) lines.push(`🧠 Humeur ${mood} au moment de payer. C'est pas l'envie — c'est l'épuisement qui décide à ta place (fatigue décisionnelle).`);
  if(isNight) lines.push(`🌙 ${hour}h du matin/soir. Ton cortex préfrontal (le frein) dort. Ton cerveau primitif (la pulsion) signe.`);
  if(location && location.length>1) lines.push(`📍 <em>${location}</em> — ce lieu déclenche tes craquages. Note-le. Évite-le quand t'es fatigué.`);
  lines.push(`<strong>Ordre du jour :</strong> demain matin, vire ${fmtFull(amt)} sur ton épargne. Réparation immédiate.`);
  return lines.join('<br><br>');
}

  openModal(`

async function saveTx(){
  const amt=parseFloat($('txAmt')?.value);
  if(!amt||amt<=0){alert('Montant invalide');return}
  const date=new Date($('txDate')?.value||new Date()).toISOString();
  const note=$('txNote')?.value||'';
  const mood=document.querySelector('input[name="txMood"]:checked')?.value||'';
  const location=$('txLoc')?.value?.trim()||'';

  if(_txType==='transfer'){
    const fromId=$('txFrom')?.value,toId=$('txTo')?.value;
    if(!fromId||!toId){alert('Sélectionne les deux comptes');return}
    if(fromId===toId){alert('Comptes identiques');return}
    const from=accs.find(a=>a.id===fromId),to=accs.find(a=>a.id===toId);
    if(from.balance<amt){alert('Solde insuffisant');return}
    from.balance-=amt;to.balance+=amt;
    await dbPut('accounts',from);await dbPut('accounts',to);
    await dbPut('transactions',{id:uid(),amount:amt,type:'transfer',categoryId:'transfer',accountId:fromId,toAccountId:toId,date,note,mood,location,createdAt:new Date().toISOString()});
    closeModal();await render();return;
  }

  const catId=$('txCat')?.value,accId=$('txAcc')?.value;
  if(!catId||!accId){alert('Sélectionne une catégorie et un compte');return}

  // ── Friction Prédictive (avant validation) ──
  if(_txType==='expense' && (DOPAMINE_CATS.includes(catId) || (catId==='food' && note && FOOD_IMPULSE_RE.test(note)))){
    const days=opportunityCostDays(amt);
    const g=getPriorityGoal();
    if(days!==null && g && days>=0.5){
      const h=Math.round(days*24);
      const msg=days>=1
        ? `⚠️ IVY : cette dépense de ${fmtFull(amt)} repousse "${g.name}" de ${days} jour${days>1?'s':''}.\n\nTu confirmes ?`
        : `⚠️ IVY : cette dépense de ${fmtFull(amt)} repousse "${g.name}" de ${h} heures.\n\nTu confirmes ?`;
      if(!confirm(msg)) return;
    }
  }

  const acc=accs.find(a=>a.id===accId);
  if(_txType==='expense' && acc.balance < amt){
    alert(`⛔ Solde insuffisant\n\n${acc.icon} ${acc.name} : ${fmtFull(acc.balance)}\nDépense demandée : ${fmtFull(amt)}\n\nLogique : on ne peut pas dépenser ce qu'on n'a pas.`);
    return;
  }
  acc.balance+=_txType==='income'?amt:-amt;
  await dbPut('accounts',acc);
  await dbPut('transactions',{id:uid(),amount:amt,type:_txType,categoryId:catId,accountId:accId,date,note,mood,location,createdAt:new Date().toISOString()});
  closeModal();await render();

  // ── IVY : verdict proactif après coup (dépenses uniquement) ──
  if(_txType==='expense'){
    const hour=new Date(date).getHours();
    const verdict=ivyVerdict({amt,catId,mood,location,hour});
    if(verdict) setTimeout(()=>showIvyVerdict(verdict),350);
  }
}

async function delTx(id){
  const t=txs.find(x=>x.id===id);if(!t)return;
  if(!confirm('Supprimer cette transaction ?'))return;
  const acc=accs.find(a=>a.id===t.accountId);
  if(acc){acc.balance+=t.type==='expense'?t.amount:-t.amount;await dbPut('accounts',acc)}
  if(t.type==='transfer'&&t.toAccountId){
    const to=accs.find(a=>a.id===t.toAccountId);
    if(to){to.balance-=t.amount;await dbPut('accounts',to)}
  }
  await dbDel('transactions',id);closeModal();await render();
}

function openDayModal(day,monthArg,yearArg){
  const now=new Date();
  const m=(monthArg!==undefined&&monthArg!==null)?monthArg:now.getMonth();
  const y=(yearArg!==undefined&&yearArg!==null)?yearArg:now.getFullYear();
  const date=new Date(y,m,day);
  const dayTxs=txs.filter(t=>new Date(t.date).toDateString()===date.toDateString());
  const total=dayTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const inc=dayTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const label=date.toLocaleDateString(getLocale(),{weekday:'long',day:'numeric',month:'long'});
  // Drill par heure
  const hours=new Array(24).fill(0);
  dayTxs.filter(t=>t.type==='expense').forEach(t=>hours[new Date(t.date).getHours()]+=t.amount);
  const maxH=Math.max(...hours,1);
  openModal(`
    <h3>📅 ${label}</h3>
    <div style="display:flex;gap:12px;margin-bottom:12px">
      <div><div class="tm" style="font-size:10px">DÉPENSES</div><div class="mono fw8" style="color:var(--red);font-size:18px">-${fmtFull(total)}</div></div>
      <div><div class="tm" style="font-size:10px">REVENUS</div><div class="mono fw8" style="color:var(--grn);font-size:18px">+${fmtFull(inc)}</div></div>
    </div>
    <div style="font-size:10px;color:var(--mut);font-weight:700;text-transform:uppercase;margin-bottom:6px">Par heure</div>
    <div style="display:grid;grid-template-columns:repeat(24,1fr);gap:2px;margin-bottom:14px">
      ${hours.map((v,h)=>`<div title="${h}h: ${fmtFull(v)}" style="height:28px;background:${intensityColor(v/maxH)};border-radius:3px;cursor:pointer" onclick="openHourModal({date:'${date.toISOString()}',hour:${h}})"></div>`).join('')}
    </div>
    <div style="font-size:10px;color:var(--mut);text-align:center;margin-bottom:10px">0h ←→ 23h · clique une barre pour les transactions</div>
    ${dayTxs.length?dayTxs.map(txItem).join(''):'<div class="tm">Aucune transaction ce jour.</div>'}
  `);
}

function openHourModal(cell){
  const dt=cell.date?new Date(cell.date):new Date();
  const h=cell.hour!==undefined?cell.hour:dt.getHours();
  const s=new Date(dt);s.setHours(h,0,0,0);
  const e=new Date(s);e.setHours(h+1);
  const list=txs.filter(t=>new Date(t.date)>=s&&new Date(t.date)<e);
  const total=list.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
  openModal(`
    <h3>⏰ ${String(h).padStart(2,'0')}h — ${s.toLocaleDateString(getLocale(),{weekday:'short',day:'numeric',month:'short'})}</h3>
    <div style="font-size:18px;font-weight:800;font-family:var(--mono);color:var(--red);margin-bottom:10px">-${fmtFull(total)}</div>
    ${list.length?list.map(txItem).join(''):'<div class="tm">Aucune transaction sur cette tranche.</div>'}
  `);
}

function openMonthModal(monthIdx,yearArg){
  const y=yearArg||new Date().getFullYear();
  const s=new Date(y,monthIdx,1),e=new Date(y,monthIdx+1,1);
  const list=txs.filter(t=>new Date(t.date)>=s&&new Date(t.date)<e);
  const total=list.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
  const inc=list.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
  const mn=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  // Heatmap par jour
  const dim=new Date(y,monthIdx+1,0).getDate();
  const days=[];let max=1;
  for(let d=1;d<=dim;d++){
    const ds=new Date(y,monthIdx,d),de=new Date(y,monthIdx,d+1);
    const a=list.filter(t=>t.type==='expense'&&new Date(t.date)>=ds&&new Date(t.date)<de).reduce((x,t)=>x+t.amount,0);
    days.push({d,a});if(a>max)max=a;
  }
  openModal(`
    <h3>🗓 ${mn[monthIdx]} ${y}</h3>
    <div style="display:flex;gap:12px;margin-bottom:12px">
      <div><div class="tm" style="font-size:10px">DÉPENSES</div><div class="mono fw8" style="color:var(--red);font-size:18px">-${fmtFull(total)}</div></div>
      <div><div class="tm" style="font-size:10px">REVENUS</div><div class="mono fw8" style="color:var(--grn);font-size:18px">+${fmtFull(inc)}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px">
      ${days.map(({d,a})=>`<div onclick="closeModal();setTimeout(()=>openDayModal(${d},${monthIdx},${y}),100)" style="aspect-ratio:1;background:${intensityColor(a/max)};border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer">${d}</div>`).join('')}
    </div>
    <div style="font-size:10px;color:var(--mut);text-align:center">Clique un jour pour drill-down heure</div>
  `);
}

function openDepositModal(id){
  const g=goals.find(x=>x.id===id);if(!g)return;
  // Comptes "actifs" qui peuvent fournir l'argent (pas le compte épargne destination)
  const sources=accs.filter(a=>a.type!=='savings');
  const savingsAcc=accs.find(a=>a.type==='savings');
  openModal(`
    <h3>💰 ${g.icon} ${g.name}</h3>
    <div style="color:var(--mut);font-size:12px;margin-bottom:8px">Déjà mis de côté : <b style="color:var(--txt)">${fmtFull(g.saved)}</b> / ${fmtFull(g.target)}</div>
    <div style="font-size:11px;color:var(--mut);margin-bottom:10px;line-height:1.5">L'argent va sortir du compte choisi et entrer dans <b>${savingsAcc?savingsAcc.icon+' '+savingsAcc.name:'Épargne'}</b>. Ton solde principal va vraiment baisser — c'est fait exprès, pour que ton cerveau voie l'effort.</div>
    <select id="depFrom" class="fi">
      ${sources.map(a=>`<option value="${a.id}">${a.icon} ${a.name} — dispo : ${fmtFull(a.balance)}</option>`).join('')}
    </select>
    <input id="depAmt" class="fi" type="number" placeholder="Montant à mettre de côté" inputmode="decimal">
    <button class="btn" onclick="saveDeposit('${id}')">Mettre de côté</button>
    ${g.saved>0?`<button class="btn btn-ghost" style="margin-top:8px" onclick="openWithdrawGoal('${id}')">↩︎ Reprendre de l'argent de cet objectif</button>`:''}
  `);
}
async function saveDeposit(id){
  const g=goals.find(x=>x.id===id);
  const amt=parseFloat($('depAmt')?.value);
  const fromId=$('depFrom')?.value;
  if(!g||!amt||amt<=0){alert('Montant invalide');return}
  const from=accs.find(a=>a.id===fromId);
  let savingsAcc=accs.find(a=>a.type==='savings');
  if(!from){alert('Choisis un compte source');return}
  if(from.balance<amt){alert(`Solde insuffisant.\n${from.icon} ${from.name} : ${fmtFull(from.balance)}\nDemandé : ${fmtFull(amt)}\n\nTu ne peux pas mettre de côté de l'argent que tu n'as pas.`);return}
  // Crée le compte épargne s'il manque (cas extrême)
  if(!savingsAcc){
    savingsAcc={id:'savings',name:'Épargne',icon:'💰',type:'savings',balance:0};
    accs.push(savingsAcc);
  }
  // Mouvement réel d'argent
  from.balance-=amt;
  savingsAcc.balance+=amt;
  await dbPut('accounts',from);
  await dbPut('accounts',savingsAcc);
  // Mise à jour de l'objectif
  g.saved=(g.saved||0)+amt;
  if(!g.deposits)g.deposits=[];
  g.deposits.push({date:new Date().toISOString(),amount:amt,fromAccountId:fromId});
  await dbPut('goals',g);
  // Trace cette opération comme transfert pour l'historique
  await dbPut('transactions',{id:uid(),amount:amt,type:'transfer',categoryId:'transfer',accountId:fromId,toAccountId:savingsAcc.id,date:new Date().toISOString(),note:`→ Objectif : ${g.name}`,goalId:g.id,createdAt:new Date().toISOString()});
  closeModal();
  await render();
  showToast(`✓ ${fmtFull(amt)} mis de côté pour ${g.name}`);
}
function openWithdrawGoal(id){
  const g=goals.find(x=>x.id===id);if(!g)return;
  const sources=accs.filter(a=>a.type!=='savings');
  openModal(`
    <h3>↩︎ Reprendre — ${g.icon} ${g.name}</h3>
    <div style="color:var(--mut);font-size:12px;margin-bottom:10px">Disponible sur cet objectif : <b style="color:var(--txt)">${fmtFull(g.saved)}</b></div>
    <div style="font-size:11px;color:var(--mut);margin-bottom:10px;line-height:1.5">L'argent revient depuis l'épargne vers le compte choisi.</div>
    <select id="wdTo" class="fi">${sources.map(a=>`<option value="${a.id}">${a.icon} ${a.name}</option>`).join('')}</select>
    <input id="wdAmt" class="fi" type="number" placeholder="Montant à reprendre" inputmode="decimal" max="${g.saved}">
    <button class="btn btn-red" onclick="doWithdrawGoal('${id}')">Reprendre</button>
  `);
}
async function doWithdrawGoal(id){
  const g=goals.find(x=>x.id===id);
  const amt=parseFloat($('wdAmt')?.value);
  const toId=$('wdTo')?.value;
  if(!g||!amt||amt<=0){alert('Montant invalide');return}
  if(amt>g.saved){alert('Tu ne peux pas reprendre plus que ce que tu as mis');return}
  const savingsAcc=accs.find(a=>a.type==='savings');
  const to=accs.find(a=>a.id===toId);
  if(!savingsAcc||!to){alert('Compte introuvable');return}
  if(savingsAcc.balance<amt){alert('Épargne insuffisante (les comptes ont été modifiés à la main ?)');return}
  savingsAcc.balance-=amt;to.balance+=amt;
  await dbPut('accounts',savingsAcc);await dbPut('accounts',to);
  g.saved-=amt;
  if(!g.deposits)g.deposits=[];
  g.deposits.push({date:new Date().toISOString(),amount:-amt,toAccountId:toId});
  await dbPut('goals',g);
  await dbPut('transactions',{id:uid(),amount:amt,type:'transfer',categoryId:'transfer',accountId:savingsAcc.id,toAccountId:toId,date:new Date().toISOString(),note:`↩︎ Repris de : ${g.name}`,goalId:g.id,createdAt:new Date().toISOString()});
  closeModal();await render();
  showToast(`↩︎ ${fmtFull(amt)} repris de ${g.name}`);
}
async function delGoal(id){
  const g=goals.find(x=>x.id===id);if(!g)return;
  if(g.saved>0){
    const sources=accs.filter(a=>a.type!=='savings');
    const def=sources[0];
    const choice=confirm(`Cet objectif a ${fmtFull(g.saved)} mis de côté.\n\nOK = renvoyer l'argent vers ${def?def.icon+' '+def.name:'le compte principal'} avant suppression.\nAnnuler = supprimer SANS toucher à l'épargne (l'argent reste dans le compte Épargne).`);
    if(choice && def){
      const savingsAcc=accs.find(a=>a.type==='savings');
      if(savingsAcc && savingsAcc.balance>=g.saved){
        savingsAcc.balance-=g.saved;def.balance+=g.saved;
        await dbPut('accounts',savingsAcc);await dbPut('accounts',def);
        await dbPut('transactions',{id:uid(),amount:g.saved,type:'transfer',categoryId:'transfer',accountId:savingsAcc.id,toAccountId:def.id,date:new Date().toISOString(),note:`↩︎ Objectif supprimé : ${g.name}`,createdAt:new Date().toISOString()});
      }
    }
  } else {
    if(!confirm('Supprimer cet objectif ?'))return;
  }
  await dbDel('goals',id);await render();
}
