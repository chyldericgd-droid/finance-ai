async function doExport(){
  const payload={v:3,date:new Date().toISOString(),txs,accs,cats,goals,settings:Object.entries(settings).map(([k,v])=>({key:k,value:v}))};
  const code=btoa(encodeURIComponent(JSON.stringify(payload)));
  openModal(`
    <h3>📤 Code de sauvegarde</h3>
    <p style="font-size:12px;color:var(--mut);margin-bottom:12px;line-height:1.6">Copie ce code. Sur un autre appareil, utilise "Restaurer" pour récupérer toutes tes données.</p>
    <div class="scode" id="scode">${code}</div>
    <button class="btn" style="margin-top:12px" onclick="copyCode()">📋 Copier</button>
    <div style="font-size:10px;color:var(--mut);margin-top:8px;text-align:center">${txs.length} transactions · ${accs.length} comptes · ${goals.length} objectifs</div>
  `);
}
function copyCode(){
  const c=$('scode')?.textContent;if(!c)return;
  navigator.clipboard?.writeText(c).then(()=>alert('✅ Copié !')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=c;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('✅ Copié !');
  });
}
function doImport(){
  openModal(`
    <h3>📥 Restaurer</h3>
    <p style="font-size:12px;color:var(--mut);margin-bottom:12px;line-height:1.6">⚠️ Toutes les données actuelles seront remplacées.</p>
    <textarea id="importCode" class="fi" style="height:120px;resize:none" placeholder="Colle ton code ici..."></textarea>
    <button class="btn" onclick="processImport()">Restaurer</button>
  `);
}
async function processImport(){
  try{
    const code=$('importCode')?.value.trim();if(!code)return;
    const p=JSON.parse(decodeURIComponent(atob(code)));
    for(const s of['transactions','accounts','categories','goals','settings'])await dbClear(s);
    for(const t of p.txs||[])await dbPut('transactions',t);
    for(const a of p.accs||[])await dbPut('accounts',a);
    for(const c of p.cats||[])await dbPut('categories',c);
    for(const g of p.goals||[])await dbPut('goals',g);
    for(const s of p.settings||[])await dbPut('settings',s);
    closeModal();await render();alert('✅ Données restaurées !');
  }catch(e){alert('❌ Code invalide.')}
}
function exportCSV(){
  const rows=[['Date','Type','Montant','Catégorie','Compte','Note']];
  txs.forEach(t=>{const cat=catById(t.categoryId),acc=accById(t.accountId);rows.push([new Date(t.date).toLocaleDateString(getLocale()),t.type,t.amount,cat.name,acc.name,t.note||''])});
  const blob=new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='transactions.csv';a.click();URL.revokeObjectURL(url);
}
async function confirmClear(){
  if(!confirm('⚠️ Effacer TOUTES les données ? Irréversible.'))return;
  for(const s of['transactions','accounts','categories','goals','settings'])await dbClear(s);
  await initData();await render();
}

// MICRO-CÉLÉBRATIONS
// ════════════════════════════════════════
function celebrate(title,sub){
  const el=document.createElement('div');
  el.className='celebration';
  el.innerHTML=`✨ <strong>${title}</strong>${sub?`<small>${sub}</small>`:''}`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3700);
}
async function checkCelebrations(){
  if(!txs.length) return;
  const seen=settings.celebrationsSeen||{};
  // 1. Première semaine complète de saisie (7 jours distincts avec au moins 1 tx)
  if(!seen.firstWeek){
    const days=new Set(txs.map(t=>new Date(t.date).toDateString()));
    if(days.size>=7){
      celebrate('Première semaine complète !','7 jours de saisie — l\'habitude commence.');
      seen.firstWeek=Date.now();
      await saveSet('celebrationsSeen',seen);
    }
  }
  // 2. Premier jalon mensuel atteint
  if(!seen.firstMilestone){
    for(const g of goals){
      const m=goalMonthly(g);
      if(m && !m.done && m.pct>=100){
        celebrate(`Jalon de "${g.name}" atteint !`,`Tu as épargné ce qu'il fallait ce mois.`);
        seen.firstMilestone=Date.now();
        await saveSet('celebrationsSeen',seen);
        break;
      }
    }
  }
  // 3. 7 jours de rétention positive
  if(!seen.weekRetention){
    const k=computeKPIs();
    if(k.retention!==null && k.retention>=25 && k.dataDays>=7){
      celebrate('7 jours de rétention positive','Tu gardes plus que tu ne dépenses. Ton cerveau apprend.');
      seen.weekRetention=Date.now();
      await saveSet('celebrationsSeen',seen);
    }
  }
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js',{scope:'./'}).then(reg=>{
      console.log('SW enregistré ✓');
      reg.addEventListener('updatefound',()=>{
        const w=reg.installing;if(!w)return;
        w.addEventListener('statechange',()=>{
          if(w.state==='installed'&&navigator.serviceWorker.controller){
            w.postMessage({type:'SKIP_WAITING'});
          }
        });
      });
      // Écouter les clics sur les notifications depuis le SW
      navigator.serviceWorker.addEventListener('message',e=>{
        if(e.data&&e.data.type==='NOTIF_CLICK'){
          go('home'); // revenir à l'accueil si on clique la notif
        }
      });
    }).catch(e=>console.warn('SW erreur:',e));
    let refreshing=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(refreshing)return;refreshing=true;location.reload();
    });
  });
}


// ════════════════════════════════════════
// GOOGLE DRIVE BACKUP
// ════════════════════════════════════════
const GDRIVE_CONFIG = {
  CLIENT_ID: '548605771267-a8nskjhah481vb3n60t6liibl8i7ia6h.apps.googleusercontent.com',
  SCOPE: 'https://www.googleapis.com/auth/drive.file',
  FILENAME: 'finance-ai-backup.json',
};
const gdrive = { token:null, fileId:null, dirty:false, tokenClient:null, _pendingBackup:false, _pendingRestore:false };

async function gdriveLoadState(){
  try{
    const sa = await dbAll('settings');
    sa.forEach(s=>{
      if(s.key==='gdrive_token' && s.value && s.value.exp>Date.now()) gdrive.token=s.value;
      if(s.key==='gdrive_fileId') gdrive.fileId=s.value;
    });
  }catch(e){}
}
async function gdriveSaveKV(k,v){ try{ await dbPut('settings',{key:k,value:v}); }catch(e){} }

function gdriveInit(){
  if(typeof google==='undefined' || !google.accounts){ setTimeout(gdriveInit,500); return; }
  try{
    gdrive.tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GDRIVE_CONFIG.CLIENT_ID,
      scope: GDRIVE_CONFIG.SCOPE,
      callback: async (resp)=>{
        if(resp && resp.access_token){
          gdrive.token = { token:resp.access_token, exp:Date.now()+(resp.expires_in*1000)-60000 };
          await gdriveSaveKV('gdrive_token', gdrive.token);
          gdriveUpdateUI();
          if(gdrive._pendingBackup){ gdrive._pendingBackup=false; gdriveBackup(); }
          if(gdrive._pendingRestore){ gdrive._pendingRestore=false; gdriveRestore(); }
        }
      }
    });
    gdriveUpdateUI();
  }catch(e){ console.warn('GIS init', e); }
}

function gdriveConnect(){
  if(!gdrive.tokenClient){ alert('Google Identity en cours de chargement, réessaie dans une seconde.'); return; }
  gdrive.tokenClient.requestAccessToken({ prompt: gdrive.token ? '' : 'consent' });
}
async function gdriveDisconnect(){
  gdrive.token=null; gdrive.fileId=null;
  await gdriveSaveKV('gdrive_token', null);
  await gdriveSaveKV('gdrive_fileId', null);
  gdriveUpdateUI();
  alert('Déconnecté de Google Drive.');
}
function gdriveEnsureToken(next){
  if(gdrive.token && gdrive.token.exp>Date.now()){ next(); return; }
  if(!gdrive.tokenClient){ alert('Google Identity en cours de chargement.'); return; }
  if(next===gdriveBackup) gdrive._pendingBackup=true;
  if(next===gdriveRestore) gdrive._pendingRestore=true;
  gdrive.tokenClient.requestAccessToken({ prompt:'' });
}

async function gdriveFindFile(){
  const q = encodeURIComponent(`name='${GDRIVE_CONFIG.FILENAME}' and trashed=false`);
  const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name,modifiedTime)`,{
    headers:{ Authorization:'Bearer '+gdrive.token.token }
  });
  if(!r.ok) throw new Error('drive list '+r.status);
  const j = await r.json();
  return (j.files && j.files[0]) || null;
}

function gdriveBuildPayload(){
  return {
    v:3, app:'finance-ai-os', date:new Date().toISOString(),
    txs, accs, cats, goals,
    settings: Object.entries(settings).map(([k,v])=>({key:k,value:v})).filter(s=>!/^gdrive_/.test(s.key))
  };
}

async function gdriveBackup(silent){
  if(!gdrive.token){ gdriveEnsureToken(gdriveBackup); return; }
  try{
    let fileId = gdrive.fileId;
    if(!fileId){
      const found = await gdriveFindFile();
      if(found) fileId = found.id;
    }
    const payload = JSON.stringify(gdriveBuildPayload());
    const boundary = '-------finance-ai-'+Date.now();
    const meta = { name: GDRIVE_CONFIG.FILENAME, mimeType:'application/json' };
    const body =
      `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n` +
      `--${boundary}\r\nContent-Type: application/json\r\n\r\n${payload}\r\n--${boundary}--`;
    const url = fileId
      ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
      : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
    const r = await fetch(url, {
      method: fileId ? 'PATCH' : 'POST',
      headers:{ Authorization:'Bearer '+gdrive.token.token, 'Content-Type':`multipart/related; boundary=${boundary}` },
      body
    });
    if(!r.ok){
      if(r.status===401){ gdrive.token=null; await gdriveSaveKV('gdrive_token',null); gdriveConnect(); return; }
      throw new Error('upload '+r.status);
    }
    const j = await r.json();
    gdrive.fileId = j.id; await gdriveSaveKV('gdrive_fileId', j.id);
    gdrive.dirty=false; gdriveUpdateUI();
    if(!silent) alert('✅ Sauvegardé sur Google Drive.');
  }catch(e){ console.warn('gdriveBackup',e); if(!silent) alert('❌ Échec sauvegarde Drive.'); }
}

async function gdriveRestore(){
  if(!gdrive.token){ gdriveEnsureToken(gdriveRestore); return; }
  try{
    let fileId = gdrive.fileId;
    if(!fileId){
      const found = await gdriveFindFile();
      if(!found){ alert('Aucune sauvegarde trouvée sur Drive.'); return; }
      fileId = found.id; gdrive.fileId=fileId; await gdriveSaveKV('gdrive_fileId', fileId);
    }
    if(!confirm('⚠️ Restaurer depuis Drive remplacera toutes les données locales. Continuer ?')) return;
    const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{
      headers:{ Authorization:'Bearer '+gdrive.token.token }
    });
    if(!r.ok){
      if(r.status===401){ gdrive.token=null; await gdriveSaveKV('gdrive_token',null); gdriveConnect(); return; }
      throw new Error('download '+r.status);
    }
    const p = await r.json();
    for(const s of ['transactions','accounts','categories','goals','settings']) await dbClear(s);
    for(const t of p.txs||[]) await dbPut('transactions',t);
    for(const a of p.accs||[]) await dbPut('accounts',a);
    for(const c of p.cats||[]) await dbPut('categories',c);
    for(const g of p.goals||[]) await dbPut('goals',g);
    for(const sset of p.settings||[]) await dbPut('settings',sset);
    // Re-save drive identifiers (cleared above)
    await gdriveSaveKV('gdrive_token', gdrive.token);
    await gdriveSaveKV('gdrive_fileId', gdrive.fileId);
    await loadAll(); await render();
    alert('✅ Données restaurées depuis Google Drive.');
  }catch(e){ console.warn('gdriveRestore',e); alert('❌ Échec restauration Drive.'); }
}

function gdriveUpdateUI(){
  const el = document.getElementById('driveStatus');
  const btn = document.getElementById('driveConnectBtn');
  const act = document.getElementById('driveActions');
  if(!el || !btn || !act) return;
  if(gdrive.token && gdrive.token.exp>Date.now()){
    el.textContent = '✓ Connecté' + (gdrive.fileId?' · backup actif':'');
    el.style.color = 'var(--grn)';
    btn.style.display = 'none';
    act.style.display = '';
  }else{
    el.textContent = 'Non connecté';
    el.style.color = 'var(--mut)';
    btn.style.display = '';
    act.style.display = 'none';
  }
}

// Hook auto-backup into mutating writes
const _origDbPut = dbPut, _origDbDel = dbDel, _origDbClear = dbClear;
function gdriveMarkDirty(){
  gdrive.dirty = true;
  if(navigator.onLine && gdrive.token && gdrive.token.exp>Date.now()){
    clearTimeout(gdrive._t);
    gdrive._t = setTimeout(()=>gdriveBackup(true), 3000);
  }
}
dbPut = async function(s,d){ const r=await _origDbPut(s,d); if(s!=='settings' || (d && !/^gdrive_/.test(d.key))) gdriveMarkDirty(); return r; };
dbDel = async function(s,id){ const r=await _origDbDel(s,id); gdriveMarkDirty(); return r; };
dbClear = async function(s){ const r=await _origDbClear(s); gdriveMarkDirty(); return r; };

window.addEventListener('online', ()=>{ if(gdrive.dirty) gdriveBackup(true); });
