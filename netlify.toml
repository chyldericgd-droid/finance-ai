# Netlify build config for Finance-AI (TanStack Start + Cloudflare Worker target)
# This template ships with @cloudflare/vite-plugin. To deploy on Netlify use the
# Netlify Edge Functions adapter or rebuild for Node. Easiest path: deploy from
# Lovable directly, or use Cloudflare Pages. For a static-only Netlify build,
# remove SSR features and run `bun run build`.

[build]
  command = "bun install && bun run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/icon-512.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
